{{- if and (include "grafana.crossplane.enabled" .) (include "grafana.crossplane.isAzure" .) .Values.postgresqlCluster.crossplane.azure.enabled -}}
{{- $tags := include "grafana.crossplane.tags" . | fromYaml -}}
{{- $containerName := .Values.postgresqlCluster.crossplane.azure.container.name -}}
---
apiVersion: storage.azure.upbound.io/v1beta1
kind: Container
metadata:
  annotations:
    crossplane.io/external-name: {{ $containerName }}
  labels:
    {{- include "grafana.crossplane.labels" (dict "ctx" . "component" "storage") | nindent 4 }}
  name: {{ $containerName }}
spec:
  forProvider:
    containerAccessType: {{ .Values.postgresqlCluster.crossplane.azure.containerAccessType | default "private" }}
    {{- if $tags }}
    metadata:
      {{- range $key, $value := $tags }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    {{- end }}
    storageAccountNameSelector:
      matchLabels:
        {{- include "grafana.crossplane.labels" (dict "ctx" . "component" "storage") | nindent 8 }}
  managementPolicies:
    {{- if .Values.postgresqlCluster.crossplane.observeOnly }}
    - Observe
    {{- else }}
    - "Create"
    - "Delete"
    - "LateInitialize"
    - "Observe"
    {{- end }}
  providerConfigRef:
    name: {{ .Values.postgresqlCluster.crossplane.providerConfigRef }}
{{- end }}
